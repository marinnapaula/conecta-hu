name: Robô do GETS

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Selenium
        run: pip install selenium

      - name: Rodar o Robô
        env:
          GETS_USER: ${{ secrets.GETS_USER }}
          GETS_PASS: ${{ secrets.GETS_PASS }}
        run: python baixar_gets.py

      - name: Salvar planilha no GitHub
        run: |
          git config --global user.name 'Robo GETS'
          git config --global user.email 'robo@hubrasil.com'
          git add planilhas_gets/
          git status
          git diff --quiet && git diff --staged --quiet || git commit -m "Automação: Nova planilha do GETS adicionada"
          git push
