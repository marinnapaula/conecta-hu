name: Robô do GETS

on:
  schedule:
    # 10:00 UTC equivale a 07:00 no horário de Brasília (Ajuste se necessário)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

# ⚠️ CRÍTICO: Garante que o robô tem permissão para fazer o 'git push'
permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        # Agora o robô instala todas as bibliotecas de uma só vez
        run: pip install -r requirements.txt

      - name: Rodar o Robô
        env:
          GETS_USER: ${{ secrets.GETS_USER }}
          GETS_PASS: ${{ secrets.GETS_PASS }}
        run: python baixar_gets.py

      - name: Salvar planilhas no GitHub
        run: |
          git config --global user.name 'Robo GETS'
          git config --global user.email 'robo@hubrasil.com'
          # Adiciona apenas a pasta de planilhas para evitar sujeira no repositório
          git add planilhas_gets/
          git status
          git diff --quiet && git diff --staged --quiet || git commit -m "Automação: Bases de dados do GETS atualizadas"
          git push
